      
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小米汽车智能客服测评</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #FF6900;
  --primary-light: rgba(255,105,0,0.08);
  --dark: #1A1A1A;
  --bg: #F5F5F7;
  --white: #FFFFFF;
  --gray: #E5E5EA;
  --gray2: #8E8E93;
  --gray3: #F0F0F5;
  --border: #E8E8ED;
  --good: #34C759;
  --mid: #FF9500;
  --bad: #FF3B30;
  --blue: #007AFF;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--dark); }

/* ===== Layout Shell ===== */
.app-shell { display: flex; width: 100vw; height: 100vh; overflow: hidden; }

/* ===== Left Sidebar ===== */
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 2;
}
.sidebar-header {
  padding: 20px 16px 12px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo {
  width: 32px; height: 32px;
  background: var(--primary); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 13px; flex-shrink: 0;
}
.sidebar-title { font-size: 16px; font-weight: 600; }

.sidebar-search {
  padding: 12px 12px 8px;
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%; padding: 8px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 13px; outline: none; background: var(--gray3);
  transition: border-color .2s, background .2s;
}
.sidebar-search input:focus { border-color: var(--primary); background: var(--white); }
.sidebar-search input::placeholder { color: var(--gray2); }

.sidebar-tabs {
  display: flex; gap: 6px; padding: 8px 12px;
  flex-wrap: wrap; flex-shrink: 0;
}
.sidebar-tab {
  padding: 4px 12px; border-radius: 14px; font-size: 12px;
  border: 1px solid var(--border); background: var(--white);
  cursor: pointer; transition: all .15s; color: var(--dark);
  white-space: nowrap;
}
.sidebar-tab:hover { border-color: var(--primary); color: var(--primary); }
.sidebar-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.sidebar-list {
  flex: 1; overflow-y: auto; padding: 4px 8px;
}
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 4px; }

.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: var(--radius);
  cursor: pointer; transition: background .12s;
  margin-bottom: 2px;
}
.sidebar-user:hover { background: var(--gray3); }
.sidebar-user.active { background: var(--primary-light); }
.sidebar-user .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; color: #fff; font-size: 14px; flex-shrink: 0;
}
.sidebar-user .u-info { flex: 1; min-width: 0; }
.sidebar-user .u-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-user .u-meta { font-size: 11px; color: var(--gray2); margin-top: 1px; }

.sidebar-footer {
  padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-footer button {
  width: 100%; padding: 9px 0;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 13px; color: var(--dark);
  cursor: pointer; transition: all .15s; display: flex;
  align-items: center; justify-content: center; gap: 6px;
}
.sidebar-footer button:hover { background: var(--gray3); border-color: var(--gray2); }

/* ===== Main Panel (Center) ===== */
.main-panel {
  flex: 1; display: flex; flex-direction: column;
  background: var(--white);
  min-width: 0;
  position: relative;
}

.main-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--gray2); gap: 12px;
}
.main-empty .icon { font-size: 56px; opacity: .35; }
.main-empty .title { font-size: 16px; font-weight: 500; }
.main-empty .desc { font-size: 13px; }

.chat-view { display: none; flex-direction: column; flex: 1; min-height: 0; }
.chat-view.active { display: flex; }

.chat-topbar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; background: var(--white);
}
.chat-topbar .avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; color: #fff; font-size: 13px; flex-shrink: 0;
}
.chat-topbar .info { flex: 1; min-width: 0; }
.chat-topbar .t-name { font-size: 14px; font-weight: 600; }
.chat-topbar .t-meta { font-size: 12px; color: var(--gray2); }
.chat-topbar .end-btn {
  padding: 6px 16px; background: var(--white);
  border: 1px solid var(--bad); color: var(--bad);
  border-radius: 6px; font-size: 13px; cursor: pointer;
  transition: all .15s; font-weight: 500;
}
.chat-topbar .end-btn:hover { background: var(--bad); color: #fff; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 14px;
  background: var(--gray3);
}
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 6px; }

.msg { max-width: 65%; display: flex; flex-direction: column; }
.msg.user { align-self: flex-end; }
.msg.bot { align-self: flex-start; }
.msg .bubble {
  padding: 10px 14px; border-radius: 12px;
  font-size: 14px; line-height: 1.6; word-break: break-word;
}
.msg.user .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: var(--white); color: var(--dark); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
.msg .time { font-size: 11px; color: var(--gray2); margin-top: 3px; padding: 0 2px; }
.msg.user .time { text-align: right; }

.typing-indicator .bubble {
  display: flex; gap: 5px; align-items: center; padding: 12px 18px;
  background: var(--white); box-shadow: var(--shadow);
  border-radius: 12px; border-bottom-left-radius: 4px;
}
.typing-dot {
  width: 7px; height: 7px; background: var(--gray2);
  border-radius: 50%; animation: typing 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{ opacity:.3; transform:scale(.8); } 30%{ opacity:1; transform:scale(1); } }

.chat-inputbar {
  border-top: 1px solid var(--border); padding: 12px 20px;
  display: flex; gap: 10px; align-items: flex-end;
  flex-shrink: 0; background: var(--white);
}
.chat-inputbar textarea {
  flex: 1; padding: 9px 14px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; resize: none; max-height: 100px;
  outline: none; font-family: inherit; line-height: 1.4;
  background: var(--gray3);
}
.chat-inputbar textarea:focus { border-color: var(--primary); background: var(--white); }
.chat-inputbar .send-btn {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--primary); border: none; color: #fff;
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0;
}
.chat-inputbar .send-btn:disabled { opacity: .35; cursor: not-allowed; }
.chat-inputbar .send-btn:not(:disabled):hover { opacity: .85; }

/* History view */
.history-view { display: none; flex-direction: column; flex: 1; min-height: 0; }
.history-view.active { display: flex; }

.history-topbar {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; background: var(--white);
}
.history-topbar h2 { flex: 1; font-size: 16px; font-weight: 600; }
.history-topbar button {
  padding: 6px 14px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; cursor: pointer;
  background: var(--white); transition: all .15s;
}
.history-topbar .back-btn { color: var(--dark); }
.history-topbar .back-btn:hover { background: var(--gray3); }
.history-topbar .clear-btn { color: var(--bad); border-color: var(--bad); }
.history-topbar .clear-btn:hover { background: var(--bad); color: #fff; }

.history-list {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.history-list::-webkit-scrollbar { width: 6px; }
.history-list::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 6px; }

.history-item {
  background: var(--gray3); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 10px;
  transition: box-shadow .15s;
}
.history-item:hover { box-shadow: var(--shadow-lg); }
.history-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.history-name { font-size: 14px; font-weight: 600; }
.history-model { font-size: 12px; color: var(--gray2); }
.history-badge {
  padding: 3px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600; color: #fff;
}
.history-badge.pass { background: var(--good); }
.history-badge.fail { background: var(--bad); }
.history-scores { font-size: 12px; color: var(--gray2); margin-bottom: 4px; }
.history-time { font-size: 12px; color: var(--gray2); margin-bottom: 6px; }
.history-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.history-tag {
  padding: 2px 8px; background: var(--white);
  border-radius: 8px; font-size: 11px; color: var(--gray2);
}
.history-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--gray2); font-size: 13px; gap: 6px;
}
.history-empty .icon { font-size: 40px; opacity: .35; }

/* ===== Right Eval Panel ===== */
.eval-panel {
  width: 300px; min-width: 300px;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.eval-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--gray2); font-size: 13px; gap: 8px;
}
.eval-empty .icon { font-size: 36px; opacity: .35; }

.eval-wrap {
  flex: 1; display: flex; flex-direction: column;
  overflow-y: auto; min-height: 0;
}
.eval-wrap::-webkit-scrollbar { width: 4px; }
.eval-wrap::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 4px; }

/* Chat-active notice */
.eval-notice {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: var(--primary-light);
  border-bottom: 1px solid rgba(255,105,0,.15);
  font-size: 12px; color: var(--primary);
  flex-shrink: 0;
}
.eval-notice .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--primary); flex-shrink: 0;
  animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

.eval-title {
  font-size: 14px; font-weight: 600;
  padding: 16px 16px 0;
  flex-shrink: 0;
}

.eval-body { padding: 12px 16px; flex: 1; }

.eval-block { margin-bottom: 16px; }
.eval-lbl {
  font-size: 12px; font-weight: 600; color: var(--gray2);
  margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .3px;
}
.req { color: var(--bad); }

/* Pass/Fail buttons */
.pf-row { display: flex; gap: 8px; }
.pf-btn {
  flex: 1; padding: 10px 8px; text-align: center;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all .15s; background: var(--white);
  user-select: none;
}
.pf-btn:hover { border-color: var(--gray2); background: var(--gray3); }
.pf-btn.pass.active { border-color: var(--good); background: rgba(52,199,89,.1); color: var(--good); }
.pf-btn.fail.active { border-color: var(--bad); background: rgba(255,59,48,.08); color: var(--bad); }

/* Score row */
.score-row { display: flex; gap: 6px; }
.score-btn {
  flex: 1; padding: 7px 4px; text-align: center;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; background: var(--white);
  user-select: none; color: var(--dark);
}
.score-btn:hover { border-color: var(--primary); color: var(--primary); }
.score-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }

/* Tag grid */
.itag-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.itag {
  padding: 5px 10px; border: 1px solid var(--border);
  border-radius: 12px; font-size: 12px; cursor: pointer;
  transition: all .15s; background: var(--white);
  user-select: none;
}
.itag:hover { border-color: var(--primary); color: var(--primary); }
.itag.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

.other-input {
  margin-top: 8px; width: 100%;
  padding: 8px 10px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 13px; outline: none; font-family: inherit;
  background: var(--gray3);
}
.other-input:focus { border-color: var(--primary); background: var(--white); }

.eval-textarea {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 13px; resize: vertical; min-height: 68px;
  outline: none; font-family: inherit; background: var(--gray3);
  line-height: 1.5;
}
.eval-textarea:focus { border-color: var(--primary); background: var(--white); }

.eval-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.eval-submit {
  width: 100%; padding: 11px;
  background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.eval-submit:hover:not(:disabled) { opacity: .88; }
.eval-submit:disabled { opacity: .35; cursor: not-allowed; }

/* Section divider */
.eval-divider {
  height: 1px; background: var(--border);
  margin: 4px 0 16px;
}
</style>
</head>
<body>

<div class="app-shell">
  <!-- ========== LEFT SIDEBAR ========== -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Mi</div>
      <span class="sidebar-title">智能客服测评</span>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="搜索昵称 / 手机号..." oninput="filterUsers()">
    </div>
    <div class="sidebar-tabs" id="tabsContainer"></div>
    <div class="sidebar-list" id="userList"></div>
    <div class="sidebar-footer">
      <button onclick="showHistory()">
        <span>📋</span> 历史记录
      </button>
    </div>
  </div>

  <!-- ========== CENTER MAIN PANEL ========== -->
  <div class="main-panel">
    <div class="main-empty" id="mainEmpty">
      <div class="icon">💬</div>
      <div class="title">请从左侧选择一个用户开始测评</div>
      <div class="desc">选择用户后可开始模拟客服对话</div>
    </div>

    <div class="chat-view" id="chatView">
      <div class="chat-topbar">
        <div class="avatar" id="chatAvatar"></div>
        <div class="info">
          <div class="t-name" id="chatName"></div>
          <div class="t-meta" id="chatMeta"></div>
        </div>

      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-inputbar">
        <textarea id="msgInput" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
    </div>

    <div class="history-view" id="historyView">
      <div class="history-topbar">
        <button class="back-btn" onclick="hideHistory()">← 返回</button>
        <h2>测评记录</h2>
        <button class="clear-btn" onclick="clearHistory()">清空</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- ========== RIGHT EVAL PANEL ========== -->
  <div class="eval-panel" id="evalPanel">
    <!-- Empty: no user selected -->
    <div class="eval-empty" id="evalEmpty">
      <div class="icon">📝</div>
      <div>选择用户后进行评价</div>
    </div>

    <!-- Eval form -->
    <div class="eval-wrap" id="evalWrap" style="display:none">
      <div class="eval-title">本次评价</div>

      <div class="eval-body">
        <!-- 1. Pass / Fail -->
        <div class="eval-block">
          <div class="eval-lbl">是否通过 <span class="req">*</span></div>
          <div class="pf-row">
            <div class="pf-btn pass" id="pfPass" onclick="setPassFail('pass')">✅ 通过</div>
            <div class="pf-btn fail" id="pfFail" onclick="setPassFail('fail')">❌ 不通过</div>
          </div>
        </div>

        <!-- 2a. Pass: 3 scores -->
        <div id="passSection" style="display:none">
          <div class="eval-divider"></div>

          <div class="eval-block">
            <div class="eval-lbl">整体体验 <span class="req">*</span></div>
            <div class="score-row" id="scOv"></div>
            <div class="score-desc" id="descOv"></div>
          </div>
          <div class="eval-block">
            <div class="eval-lbl">拟人度 <span class="req">*</span></div>
            <div class="score-row" id="scHu"></div>
            <div class="score-desc" id="descHu"></div>
          </div>
          <div class="eval-block">
            <div class="eval-lbl">解决效率 <span class="req">*</span></div>
            <div class="score-row" id="scEf"></div>
            <div class="score-desc" id="descEf"></div>
          </div>

        </div>

        <!-- 2b. Fail: reasons -->
        <div id="failSection" style="display:none">
          <div class="eval-divider"></div>
          <div class="eval-block">
            <div class="eval-lbl">不通过原因（可多选）<span class="req">*</span></div>
            <div class="fail-list" id="failList"></div>
            <input class="other-input" id="failOther" placeholder="其他原因，请输入..." style="display:none;margin-top:6px">
          </div>
        </div>

        <!-- 3. Remark -->
        <div id="remarkBlock" style="display:none">
          <div class="eval-divider"></div>
          <div class="eval-block">
            <div class="eval-lbl">备注</div>
            <textarea class="eval-textarea" id="evalRemark" placeholder="补充说明..."></textarea>
          </div>
        </div>
      </div>

      <div class="eval-footer">
        <button class="eval-submit" id="evalSubmit" disabled onclick="submitEval()">提交并结束对话</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== Data =====
const COLORS = ['#FF6900','#007AFF','#34C759','#AF52DE','#FF2D55','#5856D6','#FF9500','#00C7BE'];
const MODELS = ['SU7','SU7 Pro','SU7 Ultra','YU7'];

const FAIL_REASONS = [
  '知识性错误',
  '未正确解决问题',
  '答非所问/理解意图有误',
  '未正确转人工',
  '透漏内部信息',
  '透漏思考过程',
  '泄露隐私',
  '未正确安抚',
  '推卸责任',
  '回复过于冗长',
  '其他',
];

const SCORE_DESCS = {
  scOv: ['体验极差，完全无法接受','体验较差，问题明显','体验一般，有待改进','体验良好，基本满意','体验极佳，超出预期'],
  scHu: ['完全机械，无人情味','较为生硬，偶尔自然','部分自然，整体偏机械','较为自然，偶有机械感','非常自然，接近真人'],
  scEf: ['完全未解决，反复兜圈','多轮无效往返','最终解决但过程冗余','高效解决，轮次合理','一轮精准解决'],
};

const SCORE_LABELS = {
  scOv: { key: 'overall', name: '整体体验' },
  scHu: { key: 'humanness', name: '拟人度' },
  scEf: { key: 'efficiency', name: '解决效率' },
};

const mockUsers = [
  { id:1, name:'张明远', phone:'138****1234', model:'SU7', vin:'LMWSU7A00R1001234', buyDate:'2025-06-15', serviceEnd:'2028-06-15' },
  { id:2, name:'李思琪', phone:'139****5678', model:'SU7 Pro', vin:'LMWSU7B01R1005678', buyDate:'2025-07-20', serviceEnd:'2028-07-20' },
  { id:3, name:'王浩然', phone:'136****9012', model:'SU7 Ultra', vin:'LMWSU7C02R1009012', buyDate:'2025-08-10', serviceEnd:'2028-08-10' },
  { id:4, name:'赵雨萱', phone:'137****3456', model:'YU7', vin:'LMWYU7A03R1003456', buyDate:'2025-09-01', serviceEnd:'2028-09-01' },
  { id:5, name:'陈宇飞', phone:'135****7890', model:'SU7', vin:'LMWSU7A04R1007890', buyDate:'2025-05-18', serviceEnd:'2028-05-18' },
  { id:6, name:'刘诗涵', phone:'188****2345', model:'SU7 Pro', vin:'LMWSU7B05R1002345', buyDate:'2025-10-12', serviceEnd:'2028-10-12' },
  { id:7, name:'杨凯文', phone:'159****6789', model:'YU7', vin:'LMWYU7A06R1006789', buyDate:'2025-11-05', serviceEnd:'2028-11-05' },
  { id:8, name:'吴晨曦', phone:'186****0123', model:'SU7 Ultra', vin:'LMWSU7C07R1000123', buyDate:'2025-04-22', serviceEnd:'2028-04-22' },
  { id:9, name:'周嘉怡', phone:'133****4567', model:'SU7 Pro', vin:'LMWSU7B08R1004567', buyDate:'2025-12-01', serviceEnd:'2028-12-01' },
  { id:10, name:'孙天佑', phone:'152****8901', model:'SU7', vin:'LMWSU7A09R1008901', buyDate:'2026-01-15', serviceEnd:'2029-01-15' },
];

const botReplies = [
  u => `您好 ${u.name}，我是小米汽车智能客服。很高兴为您服务，请问有什么可以帮您？`,
  u => `关于您的 ${u.model}，我来查询一下相关信息。您的车辆VIN号为 ${u.vin}，购车日期 ${u.buyDate}，服务保障期至 ${u.serviceEnd}。请问具体遇到了什么问题？`,
  () => '好的，我理解您的问题了。根据小米汽车售后政策，这种情况可以通过以下方式解决：\n1. 预约到店检测\n2. 远程OTA诊断\n3. 联系专属服务顾问\n您希望选择哪种方式？',
  () => '非常抱歉给您带来不便。我已经为您记录了此问题，相关技术团队会在24小时内跟进处理。您还可以在"小米汽车"App中查看处理进度。',
  () => '感谢您的反馈！如果还有其他问题，随时可以联系我们。祝您用车愉快！🚗',
  () => '这个问题我需要进一步确认，请您稍等片刻。根据系统记录，建议您先检查以下几点：\n• 确认车辆固件已更新至最新版本\n• 检查网络连接是否正常\n• 重启车机系统后再试',
];

// ===== State =====
let selectedUser = null;
let currentTab = '全部';
let chatLog = [];
let replyIndex = 0;
let chatActive = false;

// Eval state
let evalResult = null;        // 'pass' | 'fail' | null
let evalScores = { overall: 0, humanness: 0, efficiency: 0 };
let evalIssueTags = new Set();
let evalFailReasons = new Set();

// ===== Init =====
function init() {
  renderTabs();
  renderUsers();
  renderFailGrid();
  renderScoreRows();
}

// ===== Tabs =====
function renderTabs() {
  const tabs = ['全部', ...MODELS];
  document.getElementById('tabsContainer').innerHTML = tabs.map(t =>
    `<div class="sidebar-tab${t===currentTab?' active':''}" onclick="switchTab('${t}')">${t}</div>`
  ).join('');
}
function switchTab(t) { currentTab = t; renderTabs(); filterUsers(); }
function filterUsers() { renderUsers(); }

// ===== User List =====
function getFiltered() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  return mockUsers.filter(u => {
    const matchModel = currentTab === '全部' || u.model === currentTab;
    const matchSearch = !q || u.name.toLowerCase().includes(q) || u.phone.includes(q);
    return matchModel && matchSearch;
  });
}

function renderUsers() {
  const list = getFiltered();
  const el = document.getElementById('userList');
  if (!list.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--gray2);font-size:13px;">没有匹配的用户</div>';
    return;
  }
  el.innerHTML = list.map(u => {
    const color = COLORS[u.id % COLORS.length];
    const active = selectedUser && selectedUser.id === u.id;
    return `<div class="sidebar-user${active?' active':''}" onclick="selectUser(${u.id})">
      <div class="avatar" style="background:${color}">${u.name[0]}</div>
      <div class="u-info">
        <div class="u-name">${u.name}</div>
        <div class="u-meta">${u.model} · ${u.vin.slice(-6)}</div>
      </div>
    </div>`;
  }).join('');
}

function selectUser(id) {
  selectedUser = mockUsers.find(u => u.id === id);
  renderUsers();
  resetEval();
  showEvalPanel();
  if (!chatActive) startChat();
  else updateChatHeader();
}

// ===== Main Panel =====
function showMainView(view) {
  document.getElementById('mainEmpty').style.display = view === 'empty' ? 'flex' : 'none';
  document.getElementById('chatView').classList.toggle('active', view === 'chat');
  document.getElementById('historyView').classList.toggle('active', view === 'history');
}

// ===== Chat =====
function startChat() {
  if (!selectedUser) return;
  chatLog = [];
  replyIndex = 0;
  chatActive = true;
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  updateChatHeader();
  showMainView('chat');
  updateEvalNotice();
  updateSubmitBtn();
  setTimeout(() => addBotMessage(botReplies[0](selectedUser)), 500);
  replyIndex = 1;
}

function updateChatHeader() {
  if (!selectedUser) return;
  const u = selectedUser;
  const color = COLORS[u.id % COLORS.length];
  const av = document.getElementById('chatAvatar');
  av.style.background = color;
  av.textContent = u.name[0];
  document.getElementById('chatName').textContent = u.name;
  document.getElementById('chatMeta').textContent = `${u.model} · ${u.vin}`;
}

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function addMessage(text, type) {
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="time">${now()}</div>`;
  el.appendChild(div);
  chatLog.push({ text, type, time: new Date().toISOString() });
  el.scrollTop = el.scrollHeight;
}

function addBotMessage(text) {
  const el = document.getElementById('chatMessages');
  const typing = document.createElement('div');
  typing.className = 'msg bot typing-indicator';
  typing.innerHTML = '<div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  el.appendChild(typing);
  el.scrollTop = el.scrollHeight;
  setTimeout(() => {
    typing.remove();
    addMessage(text, 'bot');
  }, 700 + Math.random() * 600);
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !chatActive) return;
  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  const idx = Math.min(replyIndex, botReplies.length - 1);
  replyIndex++;
  setTimeout(() => addBotMessage(botReplies[idx](selectedUser)), 300);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function endChat() {
  chatActive = false;
  document.getElementById('msgInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  // Add end message
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:12px;color:var(--gray2);padding:8px 0;';
  div.textContent = '— 对话已结束，请填写右侧评价 —';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  updateEvalNotice();
  updateSubmitBtn();
}

// ===== History =====
function showHistory() {
  renderHistory();
  showMainView('history');
}
function hideHistory() {
  showMainView(chatActive || selectedUser ? 'chat' : 'empty');
}

function renderHistory() {
  const records = JSON.parse(localStorage.getItem('mi_eval_records_v2') || '[]');
  const el = document.getElementById('historyList');
  if (!records.length) {
    el.innerHTML = '<div class="history-empty"><div class="icon">📋</div><div>暂无测评记录</div></div>';
    return;
  }
  el.innerHTML = records.map(r => {
    const d = new Date(r.time);
    const ts = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const isPass = r.result === 'pass';
    const badge = isPass
      ? '<span class="history-badge pass">通过</span>'
      : '<span class="history-badge fail">不通过</span>';
    let scores = '';
    if (isPass && r.scores) {
      scores = `<div class="history-scores">体验 ${r.scores.overall} · 拟人 ${r.scores.humanness} · 效率 ${r.scores.efficiency}</div>`;
    }
    const tags = isPass ? (r.issueTags || []) : (r.failReasons || []);
    const tagsHtml = tags.length
      ? `<div class="history-tags">${tags.map(t=>`<span class="history-tag">${t}</span>`).join('')}</div>`
      : '';
    const remark = r.remark ? `<div style="font-size:12px;color:var(--gray2);margin-top:6px">💬 ${r.remark}</div>` : '';
    return `<div class="history-item">
      <div class="history-top">
        <div><span class="history-name">${r.userName}</span><span class="history-model"> · ${r.model}</span></div>
        ${badge}
      </div>
      <div class="history-time">${ts}${r.msgCount ? ' · ' + r.msgCount + '条消息' : ''}</div>
      ${scores}${tagsHtml}${remark}
    </div>`;
  }).join('');
}

function clearHistory() {
  if (!confirm('确定清空所有测评记录？')) return;
  localStorage.removeItem('mi_eval_records_v2');
  renderHistory();
}

// ===== Eval Panel =====
function showEvalPanel() {
  document.getElementById('evalEmpty').style.display = 'none';
  document.getElementById('evalWrap').style.display = 'flex';
}

function updateEvalNotice() {}

function resetEval() {
  evalResult = null;
  evalScores = { overall: 0, humanness: 0, efficiency: 0 };
  evalFailReasons.clear();
  document.getElementById('pfPass').classList.remove('active');
  document.getElementById('pfFail').classList.remove('active');
  document.getElementById('passSection').style.display = 'none';
  document.getElementById('failSection').style.display = 'none';
  document.getElementById('remarkBlock').style.display = 'none';
  document.getElementById('evalRemark').value = '';
  resetScoreRow('scOv'); updateScoreDesc('scOv', 0);
  resetScoreRow('scHu'); updateScoreDesc('scHu', 0);
  resetScoreRow('scEf'); updateScoreDesc('scEf', 0);
  document.querySelectorAll('#failList .fail-item').forEach(t => t.classList.remove('active'));
  document.getElementById('failOther').style.display = 'none';
  document.getElementById('failOther').value = '';
  updateSubmitBtn();
}

function setPassFail(val) {
  evalResult = val;
  document.getElementById('pfPass').classList.toggle('active', val === 'pass');
  document.getElementById('pfFail').classList.toggle('active', val === 'fail');
  document.getElementById('passSection').style.display = val === 'pass' ? 'block' : 'none';
  document.getElementById('failSection').style.display = val === 'fail' ? 'block' : 'none';
  document.getElementById('remarkBlock').style.display = 'block';
  if (val === 'pass') {
    evalFailReasons.clear();
    document.querySelectorAll('#failList .fail-item').forEach(t => t.classList.remove('active'));
  } else {
    evalScores = { overall: 0, humanness: 0, efficiency: 0 };
    resetScoreRow('scOv'); updateScoreDesc('scOv', 0);
    resetScoreRow('scHu'); updateScoreDesc('scHu', 0);
    resetScoreRow('scEf'); updateScoreDesc('scEf', 0);
  }
  updateSubmitBtn();
}

// Score rows
function renderScoreRows() {
  ['scOv','scHu','scEf'].forEach(id => {
    document.getElementById(id).innerHTML = [1,2,3,4,5].map(n =>
      `<div class="score-btn" data-row="${id}" data-val="${n}" onclick="setScore('${id}',${n})">${n}</div>`
    ).join('');
  });
}

function resetScoreRow(id) {
  document.querySelectorAll(`#${id} .score-btn`).forEach(b => b.classList.remove('active'));
}

function updateScoreDesc(rowId, val) {
  const suffix = { scOv:'Ov', scHu:'Hu', scEf:'Ef' }[rowId];
  const el = document.getElementById('desc' + suffix);
  if (!el) return;
  el.textContent = val > 0 ? val + '分：' + SCORE_DESCS[rowId][val - 1] : '';
}

function setScore(rowId, val) {
  document.querySelectorAll(`#${rowId} .score-btn`).forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) === val);
  });
  evalScores[SCORE_LABELS[rowId].key] = val;
  updateScoreDesc(rowId, val);
  updateSubmitBtn();
}

// Fail reason list
function renderFailGrid() {
  document.getElementById('failList').innerHTML = FAIL_REASONS.map(r =>
    `<div class="fail-item" data-tag="${r.name}" onclick="toggleFailTag(this,'${r.name}')">
      <div class="fi-check">✓</div>
      <div class="fi-text">
        <div class="fi-name">${r.name}</div>
        <div class="fi-desc">${r.desc}</div>
      </div>
    </div>`
  ).join('');
}

function toggleFailTag(el, tag) {
  el.classList.toggle('active');
  if (evalFailReasons.has(tag)) evalFailReasons.delete(tag); else evalFailReasons.add(tag);
  document.getElementById('failOther').style.display = evalFailReasons.has('其他') ? 'block' : 'none';
  updateSubmitBtn();
}

// Submit validation
function isEvalValid() {
  if (!evalResult) return false;
  if (evalResult === 'pass') {
    return evalScores.overall > 0 && evalScores.humanness > 0 && evalScores.efficiency > 0;
  }
  if (evalResult === 'fail') {
    return evalFailReasons.size > 0;
  }
  return false;
}

function updateSubmitBtn() {
  const btn = document.getElementById('evalSubmit');
  btn.disabled = !isEvalValid();
}

function submitEval() {
  if (!isEvalValid()) return;
  // End chat if still active
  if (chatActive) {
    chatActive = false;
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    const el = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;font-size:12px;color:var(--gray2);padding:8px 0;';
    div.textContent = '— 对话已结束 —';
    el.appendChild(div);
  }

  // Collect fail reasons
  let issueTags = [];
  let failReasons = [...evalFailReasons];
  if (failReasons.includes('其他')) {
    const other = document.getElementById('failOther').value.trim();
    failReasons = failReasons.filter(t => t !== '其他');
    if (other) failReasons.push(`其他: ${other}`);
  }

  const record = {
    userId: selectedUser.id,
    userName: selectedUser.name,
    model: selectedUser.model,
    result: evalResult,
    scores: evalResult === 'pass' ? { ...evalScores } : null,
    issueTags: evalResult === 'pass' ? issueTags : [],
    failReasons: evalResult === 'fail' ? failReasons : [],
    remark: document.getElementById('evalRemark').value.trim(),
    time: new Date().toISOString(),
    msgCount: chatLog.length,
  };

  const records = JSON.parse(localStorage.getItem('mi_eval_records_v2') || '[]');
  records.unshift(record);
  localStorage.setItem('mi_eval_records_v2', JSON.stringify(records));

  // Reset and go to history
  selectedUser = null;
  chatActive = false;
  renderUsers();
  document.getElementById('evalWrap').style.display = 'none';
  document.getElementById('evalEmpty').style.display = 'flex';
  showHistory();
}

// ===== Go =====
init();
</script>
</body>
</html>
