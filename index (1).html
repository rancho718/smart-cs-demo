      
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小米汽车智能客服测评</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #FF6900;
  --dark: #1A1A1A;
  --bg: #F5F5F7;
  --white: #FFFFFF;
  --gray: #E5E5EA;
  --gray2: #8E8E93;
  --good: #34C759;
  --mid: #FF9500;
  --bad: #FF3B30;
  --blue: #007AFF;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }
.page { display: none; min-height: 100vh; flex-direction: column; }
.page.active { display: flex; }

/* ===== Header ===== */
.header { background: var(--white); padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--gray); position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 600; flex: 1; }
.header .logo { width: 28px; height: 28px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
.header .nav-btn { background: none; border: none; font-size: 14px; color: var(--primary); cursor: pointer; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: background .2s; }
.header .nav-btn:hover { background: rgba(255,105,0,0.08); }

/* ===== Page 1: User Select ===== */
.search-bar { padding: 12px 20px; background: var(--white); }
.search-bar input { width: 100%; padding: 10px 16px; border: 1.5px solid var(--gray); border-radius: 10px; font-size: 14px; outline: none; transition: border-color .2s; }
.search-bar input:focus { border-color: var(--primary); }
.tabs { display: flex; gap: 8px; padding: 12px 20px; background: var(--white); border-bottom: 1px solid var(--gray); overflow-x: auto; flex-shrink: 0; }
.tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; border: 1.5px solid var(--gray); background: var(--white); cursor: pointer; white-space: nowrap; transition: all .2s; }
.tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.content-area { display: flex; flex: 1; overflow: hidden; }
.user-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
.user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius); cursor: pointer; transition: background .15s; }
.user-item:hover { background: rgba(0,0,0,0.04); }
.user-item.selected { background: rgba(255,105,0,0.08); border: 1.5px solid var(--primary); }
.avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; font-size: 16px; flex-shrink: 0; }
.user-item .info { flex: 1; min-width: 0; }
.user-item .name { font-size: 15px; font-weight: 500; }
.user-item .meta { font-size: 12px; color: var(--gray2); margin-top: 2px; }
.user-card { width: 320px; background: var(--white); border-left: 1px solid var(--gray); padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.user-card.empty { align-items: center; justify-content: center; color: var(--gray2); font-size: 14px; }
.card-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #fff; margin: 0 auto; }
.card-name { text-align: center; font-size: 20px; font-weight: 600; }
.card-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--gray); }
.card-row .label { color: var(--gray2); }
.bottom-bar { padding: 16px 20px; background: var(--white); border-top: 1px solid var(--gray); }
.btn-primary { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary:not(:disabled):hover { opacity: 0.9; }

/* ===== Page 2: Chat ===== */
.chat-header { background: var(--white); padding: 12px 20px; border-bottom: 1px solid var(--gray); display: flex; align-items: center; gap: 12px; }
.chat-header .avatar { width: 36px; height: 36px; font-size: 14px; }
.chat-header .info .name { font-size: 15px; font-weight: 600; }
.chat-header .info .meta { font-size: 12px; color: var(--gray2); }
.chat-header .back-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.chat-header .back-btn:hover { background: rgba(0,0,0,0.05); }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 75%; display: flex; flex-direction: column; }
.msg.user { align-self: flex-end; }
.msg.bot { align-self: flex-start; }
.msg .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.user .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: var(--gray); color: var(--dark); border-bottom-left-radius: 4px; }
.msg .time { font-size: 11px; color: var(--gray2); margin-top: 4px; padding: 0 4px; }
.msg.user .time { text-align: right; }
.typing-indicator .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 18px; }
.typing-dot { width: 7px; height: 7px; background: var(--gray2); border-radius: 50%; animation: typing 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{ opacity:.3; transform:scale(.8); } 30%{ opacity:1; transform:scale(1); } }
.chat-input { background: var(--white); border-top: 1px solid var(--gray); padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; }
.chat-input textarea { flex: 1; padding: 10px 14px; border: 1.5px solid var(--gray); border-radius: 20px; font-size: 14px; resize: none; max-height: 100px; outline: none; font-family: inherit; line-height: 1.4; }
.chat-input textarea:focus { border-color: var(--primary); }
.chat-input .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .2s; flex-shrink: 0; }
.chat-input .send-btn:disabled { opacity: .4; cursor: not-allowed; }
.chat-input .end-btn { padding: 10px 16px; background: var(--bad); color: #fff; border: none; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

/* ===== Page 3: Rating Modal ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal { background: var(--white); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 20px; text-align: center; margin-bottom: 24px; }
.modal .section { margin-bottom: 20px; }
.modal .section-label { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--dark); }
.rating-btns { display: flex; gap: 10px; }
.rating-btn { flex: 1; padding: 12px; border: 2px solid var(--gray); border-radius: var(--radius); text-align: center; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .2s; }
.rating-btn[data-v="good"]:hover, .rating-btn[data-v="good"].active { border-color: var(--good); background: rgba(52,199,89,0.1); color: var(--good); }
.rating-btn[data-v="mid"]:hover, .rating-btn[data-v="mid"].active { border-color: var(--mid); background: rgba(255,149,0,0.1); color: var(--mid); }
.rating-btn[data-v="bad"]:hover, .rating-btn[data-v="bad"].active { border-color: var(--bad); background: rgba(255,59,48,0.1); color: var(--bad); }
.tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-btn { padding: 8px 14px; border: 1.5px solid var(--gray); border-radius: 20px; font-size: 13px; cursor: pointer; transition: all .2s; }
.tag-btn.active { border-color: var(--primary); background: rgba(255,105,0,0.1); color: var(--primary); }
.modal textarea { width: 100%; padding: 12px; border: 1.5px solid var(--gray); border-radius: var(--radius); font-size: 14px; resize: vertical; min-height: 80px; outline: none; font-family: inherit; }
.modal textarea:focus { border-color: var(--primary); }
.modal .submit-btn { width: 100%; margin-top: 8px; }

/* ===== Page 4: History ===== */
.history-list { flex: 1; overflow-y: auto; padding: 12px; }
.history-item { background: var(--white); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
.history-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.history-name { font-size: 15px; font-weight: 600; }
.history-model { font-size: 12px; color: var(--gray2); }
.history-rating { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; color: #fff; }
.history-rating.good { background: var(--good); }
.history-rating.mid { background: var(--mid); }
.history-rating.bad { background: var(--bad); }
.history-time { font-size: 12px; color: var(--gray2); margin-bottom: 6px; }
.history-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.history-tag { padding: 3px 10px; background: var(--bg); border-radius: 10px; font-size: 11px; color: var(--gray2); }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray2); gap: 8px; }
.empty-state .icon { font-size: 48px; opacity: .5; }

/* ===== Mobile ===== */
@media (max-width: 480px) {
  .user-card { display: none; }
  .user-card.mobile-show { display: flex; position: fixed; inset: 0; width: 100%; z-index: 50; border: none; }
  .user-card .close-card { display: block; }
  .content-area { flex-direction: column; }
  .modal { margin: 12px; max-width: none; }
  .msg { max-width: 85%; }
}
@media (min-width: 481px) {
  .user-card .close-card { display: none; }
}
</style>
</head>
<body>

<!-- ========== PAGE 1: USER SELECT ========== -->
<div class="page active" id="pageSelect">
  <div class="header">
    <div class="logo">Mi</div>
    <h1>智能客服测评</h1>
    <button class="nav-btn" onclick="showPage('pageHistory')">📋 历史</button>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索昵称或手机号..." oninput="filterUsers()">
  </div>
  <div class="tabs" id="tabsContainer"></div>
  <div class="content-area">
    <div class="user-list" id="userList"></div>
    <div class="user-card empty" id="userCard">
      <span>👈 选择一个用户查看详情</span>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn-primary" id="startBtn" disabled onclick="startChat()">开始对话</button>
  </div>
</div>

<!-- ========== PAGE 2: CHAT ========== -->
<div class="page" id="pageChat">
  <div class="chat-header">
    <button class="back-btn" onclick="showPage('pageSelect')">←</button>
    <div class="avatar" id="chatAvatar"></div>
    <div class="info">
      <div class="name" id="chatName"></div>
      <div class="meta" id="chatMeta"></div>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <textarea id="msgInput" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    <button class="end-btn" onclick="endChat()">结束对话</button>
  </div>
</div>

<!-- ========== PAGE 4: HISTORY ========== -->
<div class="page" id="pageHistory">
  <div class="header">
    <button class="nav-btn" onclick="showPage('pageSelect')" style="order:-1">← 返回</button>
    <h1>测评记录</h1>
    <button class="nav-btn" onclick="clearHistory()" style="color:var(--bad)">清空</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- ========== MODAL: RATING ========== -->
<div class="modal-overlay" id="ratingModal">
  <div class="modal">
    <h2>对话评价</h2>
    <div class="section">
      <div class="section-label">整体评分 <span style="color:var(--bad)">*</span></div>
      <div class="rating-btns">
        <div class="rating-btn" data-v="good" onclick="setRating(this)">👍 好</div>
        <div class="rating-btn" data-v="mid" onclick="setRating(this)">👌 中</div>
        <div class="rating-btn" data-v="bad" onclick="setRating(this)">👎 差</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">问题标注（可多选）</div>
      <div class="tag-grid" id="tagGrid"></div>
    </div>
    <div class="section">
      <div class="section-label">备注</div>
      <textarea id="remarkInput" placeholder="补充说明..."></textarea>
    </div>
    <button class="btn-primary submit-btn" onclick="submitRating()">提交评价</button>
  </div>
</div>

<script>
// ===== Mock Data =====
const COLORS = ['#FF6900','#007AFF','#34C759','#AF52DE','#FF2D55','#5856D6','#FF9500','#00C7BE'];
const MODELS = ['SU7','SU7 Pro','SU7 Ultra','YU7'];
const TAGS = ['答非所问','信息错误','态度不好','响应慢','重复回答','无法理解','其他'];

const mockUsers = [
  { id:1, name:'张明远', phone:'138****1234', model:'SU7', vin:'LMWSU7A00R1001234', buyDate:'2025-06-15', serviceEnd:'2028-06-15' },
  { id:2, name:'李思琪', phone:'139****5678', model:'SU7 Pro', vin:'LMWSU7B01R1005678', buyDate:'2025-07-20', serviceEnd:'2028-07-20' },
  { id:3, name:'王浩然', phone:'136****9012', model:'SU7 Ultra', vin:'LMWSU7C02R1009012', buyDate:'2025-08-10', serviceEnd:'2028-08-10' },
  { id:4, name:'赵雨萱', phone:'137****3456', model:'YU7', vin:'LMWYU7A03R1003456', buyDate:'2025-09-01', serviceEnd:'2028-09-01' },
  { id:5, name:'陈宇飞', phone:'135****7890', model:'SU7', vin:'LMWSU7A04R1007890', buyDate:'2025-05-18', serviceEnd:'2028-05-18' },
  { id:6, name:'刘诗涵', phone:'188****2345', model:'SU7 Pro', vin:'LMWSU7B05R1002345', buyDate:'2025-10-12', serviceEnd:'2028-10-12' },
  { id:7, name:'杨凯文', phone:'159****6789', model:'YU7', vin:'LMWYU7A06R1006789', buyDate:'2025-11-05', serviceEnd:'2028-11-05' },
  { id:8, name:'吴晨曦', phone:'186****0123', model:'SU7 Ultra', vin:'LMWSU7C07R1000123', buyDate:'2025-04-22', serviceEnd:'2028-04-22' },
  { id:9, name:'周嘉怡', phone:'133****4567', model:'SU7 Pro', vin:'LMWSU7B08R1004567', buyDate:'2025-12-01', serviceEnd:'2028-12-01' },
  { id:10, name:'孙天佑', phone:'152****8901', model:'SU7', vin:'LMWSU7A09R1008901', buyDate:'2026-01-15', serviceEnd:'2029-01-15' },
];

const botReplies = [
  u => `您好 ${u.name}，我是小米汽车智能客服。很高兴为您服务，请问有什么可以帮您？`,
  u => `关于您的 ${u.model}，我来查询一下相关信息。您的车辆VIN号为 ${u.vin}，购车日期 ${u.buyDate}，服务保障期至 ${u.serviceEnd}。请问具体遇到了什么问题？`,
  () => '好的，我理解您的问题了。根据小米汽车售后政策，这种情况可以通过以下方式解决：\n1. 预约到店检测\n2. 远程OTA诊断\n3. 联系专属服务顾问\n您希望选择哪种方式？',
  () => '非常抱歉给您带来不便。我已经为您记录了此问题，相关技术团队会在24小时内跟进处理。您还可以在"小米汽车"App中查看处理进度。',
  () => '感谢您的反馈！如果还有其他问题，随时可以联系我们。祝您用车愉快！🚗',
  () => '这个问题我需要进一步确认，请您稍等片刻。根据系统记录，建议您先检查以下几点：\n• 确认车辆固件已更新至最新版本\n• 检查网络连接是否正常\n• 重启车机系统后再试',
];

// ===== State =====
let selectedUser = null;
let currentTab = '全部';
let chatLog = [];
let replyIndex = 0;
let currentRating = null;
let selectedTags = new Set();

// ===== Init =====
function init() {
  renderTabs();
  renderUsers();
  renderTagGrid();
  renderHistory();
}

// ===== Page Nav =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'pageHistory') renderHistory();
}

// ===== Tabs =====
function renderTabs() {
  const tabs = ['全部', ...MODELS];
  const c = document.getElementById('tabsContainer');
  c.innerHTML = tabs.map(t => `<div class="tab${t===currentTab?' active':''}" onclick="switchTab('${t}')">${t}</div>`).join('');
}

function switchTab(t) {
  currentTab = t;
  renderTabs();
  filterUsers();
}

// ===== User List =====
function getFiltered() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  return mockUsers.filter(u => {
    const matchModel = currentTab === '全部' || u.model === currentTab;
    const matchSearch = !q || u.name.toLowerCase().includes(q) || u.phone.includes(q);
    return matchModel && matchSearch;
  });
}

function filterUsers() { renderUsers(); }

function renderUsers() {
  const list = getFiltered();
  const el = document.getElementById('userList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div>没有找到匹配的用户</div></div>';
    return;
  }
  el.innerHTML = list.map(u => {
    const color = COLORS[u.id % COLORS.length];
    const sel = selectedUser && selectedUser.id === u.id;
    return `<div class="user-item${sel?' selected':''}" onclick="selectUser(${u.id})">
      <div class="avatar" style="background:${color}">${u.name[0]}</div>
      <div class="info">
        <div class="name">${u.name}</div>
        <div class="meta">${u.model} · ${u.vin.slice(-6)}</div>
      </div>
    </div>`;
  }).join('');
}

function selectUser(id) {
  selectedUser = mockUsers.find(u => u.id === id);
  renderUsers();
  renderUserCard();
  document.getElementById('startBtn').disabled = false;
}

function renderUserCard() {
  const card = document.getElementById('userCard');
  if (!selectedUser) {
    card.className = 'user-card empty';
    card.innerHTML = '<span>👈 选择一个用户查看详情</span>';
    return;
  }
  const u = selectedUser;
  const color = COLORS[u.id % COLORS.length];
  card.className = 'user-card mobile-show';
  card.innerHTML = `
    <button class="close-card nav-btn" onclick="closeMobileCard()" style="align-self:flex-end;font-size:20px;padding:4px 8px">✕</button>
    <div class="card-avatar" style="background:${color}">${u.name[0]}</div>
    <div class="card-name">${u.name}</div>
    <div class="card-row"><span class="label">手机号</span><span>${u.phone}</span></div>
    <div class="card-row"><span class="label">车型</span><span>${u.model}</span></div>
    <div class="card-row"><span class="label">VIN</span><span>${u.vin}</span></div>
    <div class="card-row"><span class="label">购车时间</span><span>${u.buyDate}</span></div>
    <div class="card-row"><span class="label">服务到期</span><span>${u.serviceEnd}</span></div>
    <div style="flex:1"></div>
    <button class="btn-primary" onclick="closeMobileCard()">确认选择</button>
  `;
}

function closeMobileCard() {
  const card = document.getElementById('userCard');
  if (window.innerWidth <= 480) {
    card.classList.remove('mobile-show');
    card.className = 'user-card';
    // Keep the card content for desktop
  }
}

// ===== Chat =====
function startChat() {
  if (!selectedUser) return;
  chatLog = [];
  replyIndex = 0;
  document.getElementById('chatMessages').innerHTML = '';
  const u = selectedUser;
  const color = COLORS[u.id % COLORS.length];
  document.getElementById('chatAvatar').style.background = color;
  document.getElementById('chatAvatar').textContent = u.name[0];
  document.getElementById('chatName').textContent = u.name;
  document.getElementById('chatMeta').textContent = `${u.model} · ${u.vin.slice(-6)}`;
  showPage('pageChat');
  // Auto greeting
  setTimeout(() => addBotMessage(botReplies[0](u)), 600);
  replyIndex = 1;
}

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function addMessage(text, type) {
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="time">${now()}</div>`;
  el.appendChild(div);
  chatLog.push({ text, type, time: new Date().toISOString() });
  el.scrollTop = el.scrollHeight;
}

function addBotMessage(text) {
  const el = document.getElementById('chatMessages');
  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'msg bot typing-indicator';
  typing.innerHTML = '<div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  el.appendChild(typing);
  el.scrollTop = el.scrollHeight;
  setTimeout(() => {
    typing.remove();
    addMessage(text, 'bot');
  }, 800 + Math.random() * 700);
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  // Auto reply
  const idx = Math.min(replyIndex, botReplies.length - 1);
  const reply = botReplies[idx](selectedUser);
  replyIndex++;
  setTimeout(() => addBotMessage(reply), 300);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function endChat() {
  openRatingModal();
}

// ===== Rating Modal =====
function openRatingModal() {
  currentRating = null;
  selectedTags.clear();
  document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('remarkInput').value = '';
  document.getElementById('ratingModal').classList.add('active');
}

function setRating(el) {
  document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentRating = el.dataset.v;
}

function renderTagGrid() {
  document.getElementById('tagGrid').innerHTML = TAGS.map(t =>
    `<div class="tag-btn" onclick="toggleTag(this, '${t}')">${t}</div>`
  ).join('');
}

function toggleTag(el, tag) {
  el.classList.toggle('active');
  selectedTags.has(tag) ? selectedTags.delete(tag) : selectedTags.add(tag);
}

function submitRating() {
  if (!currentRating) {
    alert('请选择整体评分');
    return;
  }
  const record = {
    userId: selectedUser.id,
    userName: selectedUser.name,
    model: selectedUser.model,
    rating: currentRating,
    tags: [...selectedTags],
    remark: document.getElementById('remarkInput').value.trim(),
    time: new Date().toISOString(),
    msgCount: chatLog.length,
  };
  // Save to localStorage
  const records = JSON.parse(localStorage.getItem('mi_eval_records') || '[]');
  records.unshift(record);
  localStorage.setItem('mi_eval_records', JSON.stringify(records));
  document.getElementById('ratingModal').classList.remove('active');
  showPage('pageHistory');
}

// ===== History =====
const RATING_MAP = { good: { label:'好', cls:'good' }, mid: { label:'中', cls:'mid' }, bad: { label:'差', cls:'bad' } };

function renderHistory() {
  const records = JSON.parse(localStorage.getItem('mi_eval_records') || '[]');
  const el = document.getElementById('historyList');
  if (!records.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>暂无测评记录</div></div>';
    return;
  }
  el.innerHTML = records.map(r => {
    const ri = RATING_MAP[r.rating] || { label:'?', cls:'' };
    const d = new Date(r.time);
    const ts = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    return `<div class="history-item">
      <div class="history-top">
        <div>
          <span class="history-name">${r.userName}</span>
          <span class="history-model"> · ${r.model}</span>
        </div>
        <span class="history-rating ${ri.cls}">${ri.label}</span>
      </div>
      <div class="history-time">${ts}${r.msgCount ? ' · '+r.msgCount+'条消息' : ''}</div>
      ${r.tags.length ? '<div class="history-tags">' + r.tags.map(t=>`<span class="history-tag">${t}</span>`).join('') + '</div>' : ''}
      ${r.remark ? '<div style="font-size:13px;color:var(--gray2);margin-top:6px">💬 '+r.remark+'</div>' : ''}
    </div>`;
  }).join('');
}

function clearHistory() {
  if (!confirm('确定清空所有测评记录？')) return;
  localStorage.removeItem('mi_eval_records');
  renderHistory();
}

// ===== Go =====
init();
</script>
