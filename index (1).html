<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服能力验证平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }

/* Layout */
.app { display: flex; height: 100vh; }

/* ===== Left Panel ===== */
.left-panel { width: 320px; min-width: 320px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; }
.left-header { background: linear-gradient(135deg, #FF6900, #ff8533); color: #fff; padding: 18px 20px; flex-shrink: 0; }
.left-header h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.left-header p { font-size: 12px; opacity: .85; }

/* User input section */
.user-input-section { padding: 16px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
.user-input-section label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
.user-input-row { display: flex; gap: 8px; }
.user-input-row input { flex: 1; padding: 9px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; transition: border-color .2s; }
.user-input-row input:focus { border-color: #FF6900; }
.btn-go { background: #FF6900; color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-go:hover { background: #e55d00; }

/* User info card */
.user-info-card { padding: 16px; flex-shrink: 0; }
.user-info-card.empty { display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; padding: 40px 16px; }
.info-card { background: #fafafa; border-radius: 12px; padding: 16px; }
.info-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.info-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #FF6900, #ff8533); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; }
.info-name { font-size: 15px; font-weight: 600; color: #333; }
.info-id { font-size: 12px; color: #999; margin-top: 2px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-item { background: #fff; border-radius: 8px; padding: 10px; }
.info-item-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.info-item-value { font-size: 13px; color: #333; font-weight: 500; }
.status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.status-tag.online { background: #e8f5e9; color: #2e7d32; }
.status-tag.ended { background: #f5f5f5; color: #999; }

/* Session stats */
.session-stats { padding: 16px; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
.session-stats h4 { font-size: 12px; color: #999; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.stat-label { font-size: 13px; color: #666; }
.stat-value { font-size: 13px; color: #333; font-weight: 600; }

/* History */
.history-section { flex: 1; overflow-y: auto; border-top: 1px solid #f0f0f0; }
.history-section h4 { font-size: 12px; color: #999; padding: 12px 16px 8px; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; background: #fff; }
.history-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; transition: background .15s; }
.history-item:hover { background: #fafafa; }
.history-avatar { width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; flex-shrink: 0; }
.history-info { flex: 1; min-width: 0; }
.history-name { font-size: 13px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-time { font-size: 11px; color: #bbb; }
.history-rating { font-size: 11px; color: #FF6900; }
.history-empty { padding: 20px 16px; text-align: center; color: #ccc; font-size: 12px; }

/* ===== Right Panel ===== */
.right-panel { flex: 1; display: flex; flex-direction: column; background: #f7f8fa; }

/* Chat header */
.chat-header { background: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; flex-shrink: 0; }
.chat-header-left { display: flex; align-items: center; gap: 10px; }
.chat-header-left .avatar { width: 32px; height: 32px; border-radius: 50%; background: #FF6900; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.chat-header-title { font-size: 14px; font-weight: 600; color: #333; }
.chat-header-sub { font-size: 12px; color: #999; }
.btn-end { background: #fff; border: 1.5px solid #ff4d4f; color: #ff4d4f; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .2s; }
.btn-end:hover { background: #fff1f0; }

/* Welcome */
.welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #ccc; }
.welcome-screen .icon { font-size: 56px; }
.welcome-screen h3 { color: #999; font-size: 18px; }
.welcome-screen p { font-size: 13px; }

/* Chat area */
.chat-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }

.msg { display: flex; flex-direction: column; max-width: 70%; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-sender { font-size: 11px; color: #aaa; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.msg.user .msg-sender { justify-content: flex-end; }
.msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
.msg.bot .msg-bubble { background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.msg.user .msg-bubble { background: #e3f2fd; color: #1a1a1a; border-bottom-right-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.msg-time { font-size: 10px; color: #ccc; margin-top: 3px; }
.msg.user .msg-time { text-align: right; }

.typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
.typing-indicator span { width: 6px; height: 6px; background: #ccc; border-radius: 50%; animation: bounce 1.4s infinite; }
.typing-indicator span:nth-child(2) { animation-delay: .2s; }
.typing-indicator span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

/* Input bar */
.input-bar { display: flex; gap: 10px; padding: 12px 20px; background: #fff; border-top: 1px solid #eee; flex-shrink: 0; }
.input-bar input { flex: 1; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color .2s; }
.input-bar input:focus { border-color: #FF6900; }
.input-bar input:disabled { background: #f5f5f5; cursor: not-allowed; }
.btn-send { background: #FF6900; color: #fff; border: none; padding: 10px 22px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-send:hover { background: #e55d00; }
.btn-send:disabled { background: #ccc; cursor: not-allowed; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn .25s; }
.modal { background: #fff; border-radius: 16px; width: 90%; max-width: 420px; padding: 28px; box-shadow: 0 12px 40px rgba(0,0,0,.15); }
.modal h3 { text-align: center; font-size: 18px; color: #333; margin-bottom: 24px; }
.rating-group { margin-bottom: 16px; }
.rating-label { font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
.stars { display: flex; gap: 6px; }
.star { font-size: 26px; cursor: pointer; color: #ddd; transition: color .15s, transform .15s; user-select: none; }
.star:hover, .star.active { color: #FF6900; transform: scale(1.15); }
.yesno-group { display: flex; gap: 10px; margin-top: 4px; }
.yesno-btn { flex: 1; padding: 8px; border: 1.5px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; text-align: center; transition: all .2s; }
.yesno-btn.selected { border-color: #FF6900; background: #fff5ee; color: #FF6900; font-weight: 600; }
.modal textarea { width: 100%; height: 60px; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px; font-size: 13px; resize: none; outline: none; font-family: inherit; margin-top: 4px; }
.modal textarea:focus { border-color: #FF6900; }
.btn-submit { width: 100%; background: #FF6900; color: #fff; border: none; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all .2s; }
.btn-submit:hover { background: #e55d00; }

.hidden { display: none !important; }

/* Responsive */
@media (max-width: 768px) {
  .left-panel { width: 260px; min-width: 260px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="left-header">
      <h2>🤖 智能客服验证平台</h2>
      <p>输入用户ID开始验证对话</p>
    </div>

    <!-- User Info -->

    </div>

      <div class="stat-row"><span class="stat-label">会话时长</span><span class="stat-value" id="statDuration">00:00</span></div>
      <div class="stat-row"><span class="stat-label">状态</span><span class="stat-value" id="statStatus"><span class="status-tag online">对话中</span></span></div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection">
      <h4>历史验证记录</h4>
      <div class="history-empty" id="historyEmpty">暂无记录</div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <!-- Welcome -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="icon">💬</div>
      <h3>开始验证对话</h3>

    </div>

    <!-- Chat Header -->
    <div class="chat-header hidden" id="chatHeader">
      <div class="chat-header-left">
        <div class="avatar">🤖</div>
        <div>
          <div class="chat-header-title">智能客服 小米</div>
          <div class="chat-header-sub" id="chatHeaderSub">对话中</div>
        </div>
      </div>
      <button class="btn-end" id="btnEnd" onclick="endChat()">结束对话</button>
    </div>

    <!-- Chat -->
    <div class="chat-area hidden" id="chatArea"></div>

    <!-- Input -->
    <div class="input-bar hidden" id="inputBar">
      <input id="msgInput" placeholder="请输入消息..." maxlength="500" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn-send" id="btnSend" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

  { keywords: ['投诉','不满','差评','态度差','失望'], reply: '非常抱歉给您带来了不好的体验 🙏\n\n我已记录您的反馈，会安排专人跟进处理：\n1. 24小时内会有客服主管联系您\n2. 您也可以拨打投诉专线：400-100-5678 转3\n\n请问能具体描述一下遇到的问题吗？我会如实记录并推动改善。' },

const endKeywords = ['没有了','没了','就这些','就这样','谢谢','感谢','好的谢谢','ok谢谢','嗯谢谢','没别的了','没其他了'];
const noMoreKeywords = ['没有','没了','不','不用','不需要','没','无','不了','算了'];

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ':' + d.getSeconds().toString().padStart(2,'0');
}

function formatDuration(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2,'0');
  const s = (sec % 60).toString().padStart(2,'0');
  return m + ':' + s;
}

function startSessionTimer() {
  sessionSeconds = 0;
  sessionTimer = setInterval(() => {
    sessionSeconds++;
    document.getElementById('statDuration').textContent = formatDuration(sessionSeconds);
  }, 1000);
}

function stopSessionTimer() {
  if (sessionTimer) { clearInterval(sessionTimer); sessionTimer = null; }
}

function startChat() {
  const input = document.getElementById('userIdInput');
  const newId = input.value.trim();
  if (!newId) { input.focus(); input.style.borderColor = '#f44336'; setTimeout(() => input.style.borderColor = '', 1500); return; }

  // If there's an active chat, end it first (auto-submit with skip rating)
  if (userId && !conversationEnded) {
    endChatSilent();
  }

  userId = newId;
  conversationEnded = false;
  pendingEndCheck = false;
  msgRounds = 0;

  // Show user info
  const user = getMockUser(userId);
  document.getElementById('userInfoCard').innerHTML = `
    <div class="info-card">
      <div class="info-card-header">
        <div class="info-avatar">${user.name[0]}</div>
        <div><div class="info-name">${user.name}</div><div class="info-id">ID: ${userId}</div></div>
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="info-item-label">手机号</div><div class="info-item-value">${user.phone}</div></div>
        <div class="info-item"><div class="info-item-label">车型</div><div class="info-item-value">${user.car}</div></div>
        <div class="info-item"><div class="info-item-label">城市</div><div class="info-item-value">${user.city}</div></div>
        <div class="info-item"><div class="info-item-label">购车日期</div><div class="info-item-value">${user.regDate}</div></div>
      </div>
    </div>
  `;

  // Show session stats
  document.getElementById('sessionStats').classList.remove('hidden');
  document.getElementById('statRounds').textContent = '0';
  document.getElementById('statStatus').innerHTML = '<span class="status-tag online">对话中</span>';

  // Show chat UI
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('chatHeader').classList.remove('hidden');
  document.getElementById('chatArea').classList.remove('hidden');
  document.getElementById('inputBar').classList.remove('hidden');
  document.getElementById('chatHeaderSub').textContent = '对话中 · 用户 ' + userId;
  document.getElementById('btnEnd').style.display = '';

  // Clear chat
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('msgInput').disabled = false;
  document.getElementById('btnSend').disabled = false;
  document.getElementById('btnGo').textContent = '切换';

  startSessionTimer();
  addBotMsg('您好！我是小米汽车智能客服，很高兴为您服务 🚗\n请问有什么可以帮您？');
  document.getElementById('msgInput').focus();
}

function endChatSilent() {
  // End without rating modal (when switching users)
  conversationEnded = true;
  stopSessionTimer();
  addHistoryRecord(null); // null means no rating
}

function addMsg(text, type) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + type;

  const senderName = type === 'bot' ? '智能客服小米' : '用户 ' + userId;
  wrap.innerHTML = `
    <div class="msg-sender">${senderName} · ${getTime()}</div>
    <div class="msg-bubble"></div>
  `;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;

  const bubble = wrap.querySelector('.msg-bubble');
  if (type === 'user') {
    bubble.textContent = text;
  } else {
    typeText(bubble, text, area);
  }
}

function typeText(el, text, area, i) {
  i = i || 0;
  if (i < text.length) {
    el.textContent += text[i];
    if (area) area.scrollTop = area.scrollHeight;
    setTimeout(() => typeText(el, text, area, i + 1), 15 + Math.random() * 18);
  }
}

function addBotMsg(text) {
  // Replace placeholders with user data
  const user = getMockUser(userId);
  text = text.replace(/\{car\}/g, user.car).replace(/\{city\}/g, user.city).replace(/\{name\}/g, user.name);
  addMsg(text, 'bot');
}

function addUserMsg(text) { addMsg(text, 'user'); }

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typingMsg';
  div.innerHTML = `<div class="msg-sender">智能客服小米 · 输入中...</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typingMsg'); if (t) t.remove(); }

function findReply(text) {
  const lower = text.toLowerCase();
  for (const r of rules) {
    if (r.keywords.some(k => lower.includes(k))) return r.reply;
  }
  return '感谢您的反馈！这个问题我需要进一步确认，建议您：\n1. 尝试用关键词描述（如"充电""保养""订单"等）\n2. 拨打人工客服热线：400-100-5678\n3. 在小米汽车APP中提交服务工单\n\n请问还有其他我可以帮您的吗？';
}

function sendMsg() {
  if (conversationEnded) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addUserMsg(text);
  msgRounds++;
  document.getElementById('statRounds').textContent = msgRounds;

  const btn = document.getElementById('btnSend');
  const inp = document.getElementById('msgInput');
  btn.disabled = true; inp.disabled = true;

  if (pendingEndCheck) {
    pendingEndCheck = false;
    if (noMoreKeywords.some(k => text === k || text.startsWith(k))) {
      setTimeout(() => {
        showTyping();
        setTimeout(() => {
          removeTyping();
          addBotMsg('感谢您的咨询，祝您用车愉快！🚗✨');
          setTimeout(() => { btn.disabled = false; inp.disabled = false; triggerEnd(); }, 600);
        }, 700);
      }, 300);
      return;
    } else {
      replyNormal(text, btn, inp);
      return;
    }
  }

  if (endKeywords.some(k => text.includes(k))) {
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        removeTyping();
        addBotMsg('请问还有其他问题需要帮助吗？');
        pendingEndCheck = true;
        btn.disabled = false; inp.disabled = false;
      }, 700);
    }, 300);
    return;
  }

  replyNormal(text, btn, inp);
}

function replyNormal(text, btn, inp) {
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addBotMsg(findReply(text));
      btn.disabled = false; inp.disabled = false;
    }, 600 + Math.random() * 500);
  }, 300);
}

function triggerEnd() {
  conversationEnded = true;
  stopSessionTimer();
  document.getElementById('msgInput').disabled = true;
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnEnd').style.display = 'none';
  document.getElementById('chatHeaderSub').textContent = '对话已结束';
  document.getElementById('statStatus').innerHTML = '<span class="status-tag ended">已结束</span>';
  showRatingModal();
}

function endChat() {
  if (conversationEnded) return;
  addBotMsg('对话已结束，感谢您的咨询！😊');
  setTimeout(triggerEnd, 500);
}

function showRatingModal() {
  rating = { overall: 0, humanlike: 0, solved: null, compliant: null, comment: '' };
  document.getElementById('modalContent').innerHTML = `
    <h3>📋 服务评价</h3>
    <div class="rating-group">
      <div class="rating-label">整体评价</div>
      <div class="stars" id="starOverall">${makeStars('overall')}</div>
    </div>
    <div class="rating-group">
      <div class="rating-label">拟人度评价</div>
      <div class="stars" id="starHumanlike">${makeStars('humanlike')}</div>
    </div>
    <div class="rating-group">
      <div class="rating-label">是否解决问题</div>
      <div class="yesno-group">
        <div class="yesno-btn" onclick="setYN('solved',true,this)">✅ 已解决</div>
        <div class="yesno-btn" onclick="setYN('solved',false,this)">❌ 未解决</div>
      </div>
    </div>
    <div class="rating-group">
      <div class="rating-label">是否合规</div>
      <div class="yesno-group">
        <div class="yesno-btn" onclick="setYN('compliant',true,this)">✅ 合规</div>
        <div class="yesno-btn" onclick="setYN('compliant',false,this)">❌ 不合规</div>
      </div>
    </div>
    <div class="rating-group">
      <div class="rating-label">备注（可选）</div>
      <textarea placeholder="输入评价或改进建议..." oninput="rating.comment=this.value"></textarea>
    </div>
    <button class="btn-submit" onclick="submitRating()">提交评价</button>
  `;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function makeStars(field) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<span class="star" data-val="${i}" onclick="setStar('${field}',${i})">★</span>`;
  return h;
}

function setStar(field, val) {
  rating[field] = val;
  const cid = field === 'overall' ? 'starOverall' : 'starHumanlike';
  document.getElementById(cid).querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.val) <= val);
  });
}

function setYN(field, val, el) {
  rating[field] = val;
  el.parentElement.querySelectorAll('.yesno-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function submitRating() {
  if (!rating.overall) { alert('请选择整体评价'); return; }
  if (!rating.humanlike) { alert('请选择拟人度评价'); return; }
  if (rating.solved === null) { alert('请选择是否解决问题'); return; }
  if (rating.compliant === null) { alert('请选择是否合规'); return; }

  const record = { userId, ...rating, rounds: msgRounds, duration: formatDuration(sessionSeconds), time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) };
  console.log('评价数据:', record);
  addHistoryRecord(record);

  document.getElementById('modalContent').innerHTML = `
    <div style="text-align:center;padding:30px 0;">
      <div style="font-size:44px;margin-bottom:14px;">✅</div>
      <h3 style="margin-bottom:6px;">评价已提交</h3>
      <p style="color:#888;font-size:13px;">可继续输入新用户ID开始下一轮验证</p>
    </div>
  `;
  setTimeout(() => {
    document.getElementById('modalOverlay').classList.add('hidden');
    document.getElementById('userIdInput').value = '';
    document.getElementById('userIdInput').focus();
    document.getElementById('btnGo').textContent = '进线';
  }, 1500);
}

function addHistoryRecord(record) {
  document.getElementById('historyEmpty').classList.add('hidden');
  const list = document.getElementById('historyList');
  const user = getMockUser(userId);
  const div = document.createElement('div');
  div.className = 'history-item';

  let ratingText = '未评价';
  if (record && record.overall) {
    ratingText = '★'.repeat(record.overall) + ' · ' + record.rounds + '轮 · ' + record.duration;
  }

  div.innerHTML = `
    <div class="history-avatar">${user.name[0]}</div>
    <div class="history-info">
      <div class="history-name">${user.name}（${userId}）</div>
      <div class="history-time">${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})} · ${user.car}</div>
      <div class="history-rating">${ratingText}</div>
    </div>
  `;
  list.insertBefore(div, list.firstChild);
}

// Enter on user ID input
document.getElementById('userIdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startChat();
});
</script>
</body>
</html>
